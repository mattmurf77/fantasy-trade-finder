databases:
  - name: fantasy-trade-finder-db
    plan: free
    databaseName: trade_finder
    user: trade_finder_user

services:
  - type: web
    name: fantasy-trade-finder
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-trade-finder-db
          property: connectionString
      - key: CRON_SECRET
        sync: false   # set manually in the Render dashboard
      # Experiment tester allowlist (is_tester_allowlist targeting attr,
      # backend/experiments.py; docs/config-reference.md). Unit ids —
      # 'device:<id>' pseudo-ids and/or account ids. Currently: the
      # operator's device + account for the onboarding_v2_rollout smoke
      # (docs/business/analytics/2026-07-18-onboarding-v2-rollout-experiment.md).
      # Pseudo-ids, not secrets; declarative here so the allowlist is
      # reviewable in git. Engine picks up changes on its 60s cache refresh.
      - key: FTF_TESTER_ALLOWLIST
        value: "device:dev_loc-mrpy6qog-2t72t6,313560442465169408"

  # Push notification scheduling — three cron jobs that hit the typed
  # push system. Each authenticates with X-Cron-Secret matching the
  # CRON_SECRET env var on the web service. Set the secret to the same
  # value in both places via the Render dashboard.
  - type: cron
    name: notif-realtime-tick
    runtime: python
    schedule: "*/15 * * * *"     # every 15 minutes — match_expiring scan
    buildCommand: "true"
    startCommand: >
      curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET"
      https://fantasy-trade-finder.onrender.com/api/cron/realtime-tick
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: notif-hourly-tick
    runtime: python
    schedule: "0 * * * *"        # top of every hour — bundle drain + Tue/Wed digest
    buildCommand: "true"
    startCommand: >
      curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET"
      https://fantasy-trade-finder.onrender.com/api/cron/hourly-tick
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: notif-daily-tick
    runtime: python
    schedule: "30 13 * * *"      # 13:30 UTC ≈ 9:30am ET — re-engagement scan
    buildCommand: "true"
    startCommand: >
      curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET"
      https://fantasy-trade-finder.onrender.com/api/cron/daily-tick
    envVars:
      - key: CRON_SECRET
        sync: false
