<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Trade Finder — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Chalkline tokens (docs/design/design-system.md) */
      --ink-0: #0C0E11; --ink-1: #13161B; --ink-2: #1A1E25; --ink-3: #232833;
      --line: #262C35; --line-strong: #3D4654;
      --chalk: #ECEFF4; --chalk-dim: #97A1AE; --chalk-faint: #626C79;
      --ice: #56D9EC; --ice-press: #3FC2D6; --on-ice: #071013;
      --flare: #F0508C;
      --pos: #22C55E; --neg: #EF4444; --warn: #F59E0B;
      --qb: #F97316; --rb: #22C55E; --wr: #3B82F6; --te: #A855F7;
      --r-xs: 2px; --r-sm: 4px; --r-md: 8px; --r-pill: 999px;
      --font-ui: 'Archivo', sans-serif;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-data: 'IBM Plex Mono', monospace;
      /* Legacy aliases for the rules below */
      --bg: var(--ink-0); --surface: var(--ink-1); --border: var(--line);
      --text: var(--chalk); --muted: var(--chalk-dim);
      --accent: var(--ice); --green: var(--pos); --red: var(--neg);
      --gold: var(--warn);
      /* 8-tier pick-value ladder (docs/cross-client-invariants.md) */
      --firsts-4plus: #f87171;
      --firsts-3:     #e879f9;
      --firsts-2:     #fbbf24;
      --first-1:      #2dd4bf;
      --second:       #38bdf8;
      --third:        #f472b6;
      --fourth:       #a3e635;
      --waivers:      #7a7f96;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      max-width: 100vw;
      overflow-x: hidden;
      min-height: 100vh;
    }
    :focus-visible { outline: 2px solid var(--ice); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    .icon {
      width: 20px; height: 20px;
      stroke: currentColor; stroke-width: 1.75; fill: none;
      stroke-linecap: square; flex-shrink: 0; vertical-align: -4px;
    }
    .icon-sm { width: 16px; height: 16px; vertical-align: -3px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .pp-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    .pp-brand {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .pp-brand a { color: var(--muted); }
    .pp-brand strong { color: var(--ice); }

    .pp-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      margin-bottom: 20px;
    }
    .pp-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: var(--muted);
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .pp-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pp-who {
      flex: 1;
      min-width: 0;
    }
    .pp-display {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pp-handle {
      font-size: 13px;
      color: var(--muted);
    }
    .pp-leagues-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
    }

    .pp-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 20px 20px 24px;
      margin-bottom: 16px;
    }
    .pp-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pp-section-title::before { content: ""; width: 3px; height: 14px; background: var(--ice); }

    .pp-takes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .pp-takes-pos {
      background: var(--ink-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
    }
    .pp-takes-pos-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }
    .pp-takes-pos-title[data-pos="qb"] { color: var(--qb); }
    .pp-takes-pos-title[data-pos="rb"] { color: var(--rb); }
    .pp-takes-pos-title[data-pos="wr"] { color: var(--wr); }
    .pp-takes-pos-title[data-pos="te"] { color: var(--te); }

    .pp-take-group {
      margin-top: 8px;
    }
    .pp-take-group-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pp-take-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
    }
    .pp-take-delta {
      font-family: var(--font-data);
      font-weight: 500;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    .pp-take-delta.above { color: var(--green); }
    .pp-take-delta.below { color: var(--red); }

    .pp-tiers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .pp-tier-pos {
      background: var(--ink-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
    }
    .pp-tier-pos-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }
    .pp-tier-pos-title[data-pos="qb"] { color: var(--qb); }
    .pp-tier-pos-title[data-pos="rb"] { color: var(--rb); }
    .pp-tier-pos-title[data-pos="wr"] { color: var(--wr); }
    .pp-tier-pos-title[data-pos="te"] { color: var(--te); }

    .pp-tier-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 4px 0;
      border-top: 1px dashed var(--border);
      font-size: 12px;
    }
    .pp-tier-row:first-of-type { border-top: none; }
    .pp-tier-label {
      flex: 0 0 58px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-top: 3px;
    }
    .pp-tier-label[data-tier="firsts_4plus"] { color: var(--firsts-4plus); }
    .pp-tier-label[data-tier="firsts_3"] { color: var(--firsts-3); }
    .pp-tier-label[data-tier="firsts_2"] { color: var(--firsts-2); }
    .pp-tier-label[data-tier="first_1"] { color: var(--first-1); }
    .pp-tier-label[data-tier="second"]  { color: var(--second); }
    .pp-tier-label[data-tier="third"]   { color: var(--third); }
    .pp-tier-label[data-tier="fourth"]  { color: var(--fourth); }
    .pp-tier-label[data-tier="waivers"] { color: var(--waivers); }

    .pp-tier-names {
      flex: 1;
      color: var(--text);
      line-height: 1.4;
    }

    .pp-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 10px 0;
      font-style: italic;
    }

    .pp-cta {
      display: block;
      background: var(--ice);
      color: var(--on-ice);
      padding: 14px 24px;
      border-radius: var(--r-sm);
      text-align: center;
      font-weight: 600;
      margin-top: 24px;
      font-size: 15px;
    }
    .pp-cta:hover {
      background: var(--ice-press);
      text-decoration: none;
    }

    .pp-error {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
    }
    .pp-error-title {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="pp-wrap">
    <div class="pp-brand">
      <a href="/">← <strong>Fantasy Trade Finder</strong></a>
    </div>

    <div id="pp-content">
      <div class="pp-section">
        <div class="pp-empty">Loading profile…</div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const POS_LABELS = { qb: 'QB', rb: 'RB', wr: 'WR', te: 'TE' };
      const TIER_ORDER = ['firsts_4plus', 'firsts_3', 'firsts_2', 'first_1',
                          'second', 'third', 'fourth', 'waivers'];
      const TIER_LABELS = {
        firsts_4plus: '4+ 1sts', firsts_3: '3 1sts', firsts_2: '2 1sts',
        first_1: '1st', second: '2nd',
        third: '3rd', fourth: '4th', waivers: 'FA',
      };

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function extractUsername() {
        // Path is /u/<username> — strip leading /u/ and any trailing slash.
        const p = window.location.pathname.replace(/^\/u\//, '').replace(/\/$/, '');
        return decodeURIComponent(p || '');
      }

      function avatarInitials(name) {
        if (!name) return '?';
        const parts = name.trim().split(/\s+/);
        return (parts[0][0] || '?').toUpperCase() + (parts[1] ? parts[1][0].toUpperCase() : '');
      }

      function renderTakesPos(pos, data) {
        const above = (data && data.above) || [];
        const below = (data && data.below) || [];
        if (!above.length && !below.length) return '';

        const row = (p, kind) => `
          <div class="pp-take-row">
            <span>${esc(p.name)}</span>
            <span class="pp-take-delta ${kind}">${p.delta > 0 ? '+' : ''}${p.delta}</span>
          </div>`;

        return `
          <div class="pp-takes-pos">
            <div class="pp-takes-pos-title" data-pos="${pos}">${POS_LABELS[pos]}</div>
            ${above.length ? `
              <div class="pp-take-group">
                <div class="pp-take-group-label">Higher than community</div>
                ${above.map(p => row(p, 'above')).join('')}
              </div>` : ''}
            ${below.length ? `
              <div class="pp-take-group">
                <div class="pp-take-group-label">Lower than community</div>
                ${below.map(p => row(p, 'below')).join('')}
              </div>` : ''}
          </div>`;
      }

      function renderTiersPos(pos, buckets) {
        if (!buckets || !Object.keys(buckets).length) return '';
        const rows = TIER_ORDER
          .filter(t => buckets[t] && buckets[t].length)
          .map(t => `
            <div class="pp-tier-row">
              <div class="pp-tier-label" data-tier="${t}">${TIER_LABELS[t]}</div>
              <div class="pp-tier-names">
                ${buckets[t].map(p => esc(p.name)).join(', ')}
              </div>
            </div>`).join('');
        if (!rows) return '';
        return `
          <div class="pp-tier-pos">
            <div class="pp-tier-pos-title" data-pos="${pos}">${POS_LABELS[pos]}</div>
            ${rows}
          </div>`;
      }

      function render(data) {
        const displayName = data.display_name || data.username;
        const avatarHtml = data.avatar_url
          ? `<img src="${esc(data.avatar_url)}" alt="" onerror="this.style.display='none'; this.parentNode.textContent='${esc(avatarInitials(displayName))}';">`
          : esc(avatarInitials(displayName));

        const takesGrid = ['qb','rb','wr','te']
          .map(pos => renderTakesPos(pos, (data.contrarian_takes || {})[pos]))
          .filter(Boolean)
          .join('');
        const tiersGrid = ['qb','rb','wr','te']
          .map(pos => renderTiersPos(pos, (data.tiers_snapshot || {})[pos]))
          .filter(Boolean)
          .join('');

        const html = `
          <div class="pp-header">
            <div class="pp-avatar">${avatarHtml}</div>
            <div class="pp-who">
              <div class="pp-display">${esc(displayName)}</div>
              <div class="pp-handle">@${esc(data.username)}</div>
              ${data.leagues_count ? `<div class="pp-leagues-chip"><svg class="icon icon-sm" viewBox="0 0 20 20" aria-hidden="true"><path d="M3 16l2-9 4 3 1-6 1 6 4-3 2 9z"/></svg>${data.leagues_count} league${data.leagues_count === 1 ? '' : 's'}</div>` : ''}
            </div>
          </div>

          <div class="pp-section">
            <div class="pp-section-title">Top Contrarian Takes</div>
            ${takesGrid ? `<div class="pp-takes-grid">${takesGrid}</div>` : `<div class="pp-empty">Not enough community data yet — invite leaguemates to unlock.</div>`}
          </div>

          <div class="pp-section">
            <div class="pp-section-title">Current Tiers Snapshot</div>
            ${tiersGrid ? `<div class="pp-tiers-grid">${tiersGrid}</div>` : `<div class="pp-empty">No tiers saved yet.</div>`}
          </div>

          <a class="pp-cta" href="/">See their rankings in Fantasy Trade Finder →</a>`;

        document.getElementById('pp-content').innerHTML = html;
      }

      function renderError(message) {
        document.getElementById('pp-content').innerHTML = `
          <div class="pp-error">
            <div class="pp-error-title">Profile not found</div>
            <div>${esc(message || 'This user hasn\u2019t set up a Fantasy Trade Finder profile yet.')}</div>
          </div>`;
      }

      async function load() {
        const uname = extractUsername();
        if (!uname) {
          renderError('No username in URL.');
          return;
        }
        document.title = `@${uname} — Fantasy Trade Finder`;
        try {
          const res = await fetch('/api/profile/' + encodeURIComponent(uname), { cache: 'no-store' });
          if (res.status === 404) {
            renderError();
            return;
          }
          if (!res.ok) {
            renderError('Server error (' + res.status + ').');
            return;
          }
          const data = await res.json();
          render(data);
        } catch (e) {
          renderError('Could not load profile.');
        }
      }

      load();
    })();
  </script>
</body>
</html>
