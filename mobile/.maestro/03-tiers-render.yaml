appId: com.fantasytradefinder.app
---
# Open Tiers screen via Rank tab -> action sheet.
# Needs `landing.try_before_sync` overridden ON (see 02-demo-session.yaml).
# Selectors moved to testIDs 2026-07-12 (QA F-2): demo CTA via
# `signin.demo-link`; Rank action-sheet row via `rankmenu.tiers`; the old
# "RB" default-position assert is stale (the screen no longer lands on RB) —
# `tiers.list` + `tiers.save-btn` prove the Tiers screen rendered.
- launchApp:
    clearState: true
    stopApp: true
- tapOn:
    id: "signin.demo-link"
- extendedWaitUntil:
    visible:
      id: "tab.trades"
    timeout: 20000
# Rank tab opens an action sheet rather than a direct nav (TabNav.tsx).
- tapOn:
    id: "tab.rank"
- extendedWaitUntil:
    visible:
      id: "rankmenu.tiers"
    timeout: 10000
- tapOn:
    id: "rankmenu.tiers"
- extendedWaitUntil:
    visible:
      id: "tiers.list"
    timeout: 20000
- assertVisible:
    id: "tiers.save-btn"
- takeScreenshot: 03-tiers-rendered
