appId: com.fantasytradefinder.app
# tc: TC-TRD-01
# profile: standard
# flags: release
# First Trades visit auto-opens the team-outlook sheet (first-run prompt) —
# dismissed conditionally via outlook.save-btn (Contender pre-selected).
tags: [smoke, trades]
---
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- extendedWaitUntil:
    visible:
      id: "signin.username-input"
    timeout: 15000
- tapOn:
    id: "signin.username-input"
- inputText: "qa_standard"
- tapOn:
    id: "signin.continue-btn"
- extendedWaitUntil:
    visible:
      id: "leagues.row.990000000000000001"
    timeout: 30000
- tapOn:
    id: "leagues.row.990000000000000001"
- extendedWaitUntil:
    visible:
      id: "tab.trades"
    timeout: 30000
- tapOn:
    id: "tab.trades"
- runFlow:
    when:
      visible:
        id: "outlook.save-btn"
    commands:
      - tapOn:
          id: "outlook.save-btn"
      - extendedWaitUntil:
          notVisible:
            id: "outlook.save-btn"
          timeout: 5000
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "trades.find-btn"
    timeout: 20000
- assertVisible:
    id: "trades.empty-text"
- takeScreenshot: smoke-05-trades-render
