appId: com.fantasytradefinder.app
# tc: TC-LEA-01
# profile: standard
# flags: release
tags: [smoke, league]
---
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- extendedWaitUntil:
    visible:
      id: "signin.username-input"
    timeout: 15000
- tapOn:
    id: "signin.username-input"
- inputText: "qa_standard"
- tapOn:
    id: "signin.continue-btn"
- extendedWaitUntil:
    visible:
      id: "leagues.row.990000000000000001"
    timeout: 30000
- tapOn:
    id: "leagues.row.990000000000000001"
- extendedWaitUntil:
    visible:
      id: "tab.trades"
    timeout: 30000
- tapOn:
    id: "tab.league"
- extendedWaitUntil:
    visible:
      id: "league.hero"
    timeout: 20000
- takeScreenshot: smoke-09-league
